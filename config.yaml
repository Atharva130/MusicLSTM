data:
  midi_dir: "data/midi"
  audio_dir: "data/audio"
  composers:
    - "bach"
    - "beethoven"
    - "chopin"
  sequence_length: 64
  test_split: 0.1

model:
  embedding_dim: 64
  hidden_size: 512
  num_layers: 2
  dropout: 0.3
  use_attention: true

training:
  batch_size: 64
  epochs: 100
  learning_rate: 0.001
  clip_grad_norm: 5.0
  save_every: 10
  device: "cuda"

generation:
  temperature: 1.0
  max_length: 200
  seed_length: 10

moods:
  sad:
    key: "minor"
    tempo: 90        
    composer: "chopin"
  romantic:
    key: "major"
    tempo: 100        
    composer: "beethoven"
  calm:
    key: "major"
    tempo: 100        
    composer: "bach"
  energetic:
    key: "major"
    tempo: 175       
    composer: "beethoven"
  dark:
    key: "minor"
    tempo: 125       
    composer: "bach"